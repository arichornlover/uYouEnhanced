# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean
      ytuhd:
        description: "Include YTUHD (this will clone dav1d + libvpx libraries)"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouEnhanced
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v7
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: |
          set -euo pipefail
          brew update
          brew install ldid dpkg make wget unzip jq pipx || true
          # ensure GNU make in PATH
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Set PATH Environment Variables
        run: |
          # THEOS path will be used by later steps
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
          # ensure pipx binaries will be found
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v7
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      - name: SDK Caching
        id: SDK
        uses: actions/cache@v6
        with:
          path: theos/sdks/
          key: iOS-${{ inputs.sdk_version }}-SDK

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euo pipefail
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/aricloverALT/sdks/ sdks
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout --quiet
          mv *.sdk "$THEOS/sdks"

      - name: Setup Theos Jailed
        uses: actions/checkout@v7
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          set -euo pipefail
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan and tbd
        run: |
          set -euo pipefail
          # Use pipx installed via brew (pipx installed in Install Dependencies step)
          pipx ensurepath || true
          # Install cyan (pyzule-rw) via pipx so we have an isolated executable
          pipx install https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip || true
          # Install tbd binary for tools that need it
          wget --quiet --no-verbose "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd || true
          chmod +x /usr/local/bin/tbd || true

      - name: Clone headers
        run: |
          set -euo pipefail
          THEOS=${{ github.workspace }}/theos
          if [ ! -d "$THEOS/include/YouTubeHeader" ]; then
            git clone --quiet --depth=1 https://github.com/aricloverEXTRA/YouTubeHeader.git "$THEOS/include/YouTubeHeader"
          else
            cd "$THEOS/include/YouTubeHeader" && git pull --quiet --force || true
          fi
          if [ ! -d "$THEOS/include/PSHeader" ]; then
            git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git "$THEOS/include/PSHeader"
          else
            cd "$THEOS/include/PSHeader" && git pull --quiet --force || true
          fi

      - name: Hash YT ipa url
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' $GITHUB_EVENT_PATH)"
          echo ::add-mask::$URL_YT
          echo URL_YT=$URL_YT >> $GITHUB_ENV

      - name: Prepare YouTube iPA
        id: prepare_youtube
        run: |
          set -euo pipefail
          mkdir -p main
          wget "$URL_YT" --quiet -O main/YouTube.ipa
          cd main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "YT_VERSION=$youtube_version" >> $GITHUB_ENV
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT
          echo "==> YouTube v$youtube_version downloaded!"

      - name: Fix compiling & Build Package
        id: build_package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euo pipefail
          cd main
          # Update Makefile values; append if missing
          if grep -q '^BUNDLE_ID' Makefile; then
            sed -i '' "s/^BUNDLE_ID *=.*$/BUNDLE_ID = ${{ inputs.bundle_id }}/" Makefile || true
          else
            echo "BUNDLE_ID = ${{ inputs.bundle_id }}" >> Makefile
          fi
          if grep -q '^DISPLAY_NAME' Makefile; then
            sed -i '' "s/^DISPLAY_NAME *=.*$/DISPLAY_NAME = ${{ inputs.app_name }}/" Makefile || true
          else
            echo "DISPLAY_NAME = ${{ inputs.app_name }}" >> Makefile
          fi
          if grep -q '^export TARGET' Makefile; then
            sed -i '' "s/^export TARGET *=.*$/export TARGET = iphone:clang:${{ inputs.sdk_version }}:16.0/" Makefile || true
          else
            echo "export TARGET = iphone:clang:${{ inputs.sdk_version }}:16.0" >> Makefile
          fi
          # Set YTUHD flag
          if [ "${{ inputs.ytuhd }}" = "true" ]; then
            echo "YTUHD_ENABLED=1" >> Makefile
          else
            echo "YTUHD_ENABLED=0" >> Makefile
          fi
          # Build package — let real compiler errors fail the job
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1
          echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT
          echo "==> SHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')"
          echo "==> Bundle ID: ${{ inputs.bundle_id }}"

      - name: Clone Open in YouTube (Safari Extension)
        run: |
          set -euo pipefail
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git OpenYouTubeSafariExtension || true
          cd OpenYouTubeSafariExtension || exit 0
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex || true
          git checkout --quiet || true
          mv *.appex "${{ github.workspace }}/" 2>/dev/null || true

      - name: Prepare YTUHD vendor libs and build (conditional)
        if: ${{ inputs.ytuhd }}
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euo pipefail
          echo "⚠️ Installing YTUHD + required libraries (dav1d + libvpx)..."
          mkdir -p "$THEOS/vendor"
          git clone --quiet --depth=1 https://code.videolan.org/videolan/dav1d.git "$THEOS/vendor/dav1d" || true
          git clone --quiet --depth=1 https://chromium.googlesource.com/webm/libvpx "$THEOS/vendor/libvpx" || true
          rm -rf "${{ github.workspace }}/YTUHD" || true
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTUHD.git "${{ github.workspace }}/YTUHD" || true
          cd "${{ github.workspace }}/YTUHD"
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless || true
          # copy any produced debs for later injection
          find packages -type f -name '*.deb' -exec cp -n {} "${{ github.workspace }}/" \; || true
          echo "YTUHD + libraries prepared."

      - name: Normalize OpenYouTube.appex CFBundleIdentifier
        run: |
          set -euo pipefail
          # Normalize any OpenYouTube appex to have the same prefix as the bundle id we pass to cyan
          BUNDLE_ID="${{ inputs.bundle_id }}"
          for ap in OpenYouTubeSafariExtension.appex *.appex; do
            [ -d "$ap" ] || continue
            plist="$ap/Info.plist"
            if [ -f "$plist" ]; then
              old=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" 2>/dev/null || echo "")
              if [ -n "$old" ]; then
                last="${old##*.}"
                new="${BUNDLE_ID}.${last}"
                echo "Updating $plist: $old -> $new"
                /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $new" "$plist" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $new" "$plist"
              fi
            fi
          done

      - name: Collect built tweak packages
        run: |
          set -euo pipefail
          # Copy .deb packages from likely locations into workflow root for cyan injection
          for src in main/packages packages YTUHD/packages .; do
            if [ -d "$src" ]; then
              find "$src" -type f -name '*.deb' -print0 2>/dev/null | xargs -0 -I{} cp -n {} . || true
            fi
          done
          echo "DEBs to be injected:"
          ls -1 *.deb 2>/dev/null || echo "(none)"

      - name: Inject Tweaks Into IPA
        run: |
          set -euo pipefail
          # Determine IPA input
          IPA_IN="main/packages/${{ steps.build_package.outputs.package }}"
          if [ ! -f "$IPA_IN" ]; then
            IPA_IN=$(ls -t main/packages/*.ipa 2>/dev/null | head -n1 || echo "")
          fi
          if [ -z "$IPA_IN" ]; then
            echo "::error::No IPA found to inject"
            exit 1
          fi
          OUTNAME="uYouEnhanced_${{ env.YT_VERSION }}_v${{ inputs.uyou_version }}.ipa"
          tweaks="OpenYouTubeSafariExtension.appex"
          for f in *.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f" || true
          done
          echo "Injecting tweaks: $tweaks into $IPA_IN -> $OUTNAME"
          cyan -i "$IPA_IN" -o "$OUTNAME" -uwef $tweaks -n "${{ inputs.app_name }}" -b ${{ inputs.bundle_id }}
          ls -la "$OUTNAME" || true

      - name: Validate extension CFBundleIdentifiers match parent
        run: |
          set -euo pipefail
          OUTIPA="uYouEnhanced_${{ env.YT_VERSION }}_v${{ inputs.uyou_version }}.ipa"
          if [ ! -f "$OUTIPA" ]; then
            echo "::error::Final IPA $OUTIPA not found"
            exit 1
          fi
          tmpd=$(mktemp -d)
          unzip -q "$OUTIPA" -d "$tmpd"
          PARENT=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$tmpd/Payload"/*.app/Info.plist)
          echo "Parent ID: $PARENT"
          bad=0
          find "$tmpd/Payload" -name Info.plist | while read -r p; do
            # skip main app Info.plist
            case "$p" in
              "$tmpd"/Payload/*.app/Info.plist) continue ;;
            esac
            id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$p" 2>/dev/null || echo "")
            if [ -n "$id" ] && [[ "$id" != "$PARENT"* ]]; then
              echo "::error::Extension id '$id' in $p does not start with parent '$PARENT'"
              bad=1
            fi
          done
          rm -rf "$tmpd"
          if [ "$bad" -ne 0 ]; then
            echo "::error::Extension ID validation failed; extension bundle ID(s) do not match parent prefix."
            exit 1
          fi
          echo "Extension id validation OK."

      - name: Create a Draft Release
        uses: softprops/action-gh-release@v3
        if: ${{ inputs.create_release }}
        with:
          tag_name: uYouEnhanced-ipa-${{ github.run_number }}
          name: uYouEnhanced_${{ env.YT_VERSION }}_v${{ inputs.uyou_version }} (${{ github.run_number }})
          files: uYouEnhanced_${{ env.YT_VERSION }}_v${{ inputs.uyou_version }}.ipa
          draft: true

      - name: Job Summary - Build Complete
        run: |
          echo -e '### 🛠️ Build IPA with tweaks Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e '### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Cleanup
        run: |
          echo -e '### 🧹 Cleanup\n\nYou can remove previous GitHub Actions run here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-workflows-run.yml' >> $GITHUB_STEP_SUMMARY
